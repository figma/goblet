name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  go-build-test:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc cmake pkg-config

      - name: Install git2go
        run: |
          VERSION=$(go list -m -f '{{ .Version }}' github.com/libgit2/git2go/v34)
          git clone https://github.com/libgit2/git2go.git /tmp/git2go
          cd /tmp/git2go
          git checkout "tags/${VERSION}"
          git submodule update --init
          make install-static
          cd $GITHUB_WORKSPACE
          go mod edit -replace github.com/libgit2/git2go/v34=/tmp/git2go

      - name: Build
        run: |
          go build -tags static -o /tmp/goblet-server ./goblet-server
          go build -tags static -o /tmp/packobjectshook ./hooks/packobjects

      - name: Test
        run: go test -tags static ./...

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/figma/goblet
          tags: |
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
